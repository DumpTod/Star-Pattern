services:
  - type: web
    name: pattern-scanner
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: FYERS_APP_ID
        sync: false
      - key: FYERS_ACCESS_TOKEN
        sync: false
      - key: PYTHON_VERSION
        value: 3.11.0
